version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-patch-minor:
        patterns:
          - '*'
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
    labels:
      - dependencies
      - type:chore
      - area:ci
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      github-actions-patch-minor:
        patterns:
          - '*'
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
    labels:
      - dependencies
      - type:chore
      - area:ci
