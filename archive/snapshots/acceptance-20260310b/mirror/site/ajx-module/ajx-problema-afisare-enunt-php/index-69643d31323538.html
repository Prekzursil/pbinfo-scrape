			<h1>Cerința</h1>

<p>Se dau două numere naturale. Calculați diferenţa lor.</p>

<h1>Restricții și precizări</h1>

<ul>
	<li>cele două numere sunt mai mici decât <code>2.000.000.000</code></li>
	<li>se va scădea al doilea număr din primul</li>
</ul>

<h1>Exemplu:</h1>

<p><strong>Intrare</strong></p>

<p><code>5 3</code></p>

<p><strong>Ieșire</strong></p>

<p><code>2</code></p>		</article>
