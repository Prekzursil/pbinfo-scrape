			<h1>Cerința</h1>

<p>Se dă <code>n</code>. Să se afișeze <code>10</code><sup><code>n</code></sup>.</p>

<h1>Date de intrare</h1>

<p>Programul citește de la tastatură numărul <code>n</code>.</p>

<h1>Date de ieșire</h1>

<p>Programul va afișa pe ecran numărul <code>P</code>, reprezentând <code>10</code><sup><code>n</code></sup>.</p>

<h1>Restricții și precizări</h1>

<p>• <code>0 ≤ n ≤ 1.000</code></p>

<h1>Exemplu:</h1>

<p><strong>Intrare</strong></p>

<pre>5</pre>

<p><strong>Ieșire</strong></p>

<pre>100000</pre>		</article>
