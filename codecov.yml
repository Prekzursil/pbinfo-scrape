codecov:
  require_ci_to_pass: true

ignore:
  # Lint / build / config declarations (not executable product source).
  - .github/**
  - codecov.yml
  - eslint.config.js
  - .prettierrc.json
  - .stylelintrc.cjs
  - .htmlhintrc
  - electron-builder.json
  - tsconfig.json
  - tsconfig.desktop.json
  - vite.desktop.config.ts
  - vitest.config.ts
  - package.json
  - package-lock.json
  # Type-only declarations carry no executable statements.
  - src/types/**
  - src/gui/shared/types.ts
  - src/gui/shared/contracts.ts
  # Static renderer assets and styling are not executable TypeScript.
  - src/gui/renderer/assets/**
  - '**/*.css'
  - '**/*.html'
  - '**/*.svg'
  # Tests and one-off operational scripts are not part of the product surface.
  - tests/**
  - scripts/**

coverage:
  precision: 2
  round: down
  range: '100...100'
  status:
    project:
      default:
        target: 100%
        threshold: 0%
    patch:
      default:
        target: 100%
        threshold: 0%

comment:
  layout: 'reach,diff,flags,files'
